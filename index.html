<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="羽翼">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<title>羽翼進銷存</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f4f8;--sf:#fff;--sf2:#f8fafc;--bd:#e2e8f0;
  --tx:#0f172a;--tx2:#475569;--tx3:#94a3b8;
  --nv:#0f172a;--bl:#1d4ed8;--bll:#eff6ff;
  --gn:#059669;--gnl:#ecfdf5;
  --am:#d97706;--aml:#fffbeb;
  --pu:#7c3aed;--pul:#f5f3ff;
  --rd:#dc2626;--rdl:#fef2f2;
  --st:env(safe-area-inset-top,44px);
  --sb:env(safe-area-inset-bottom,20px);
  --th:60px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:'Noto Sans TC',sans-serif;color:var(--tx);overflow:hidden}
#app{display:flex;flex-direction:column;height:100%}
#hdr{background:var(--nv);padding:calc(var(--st)+8px) 16px 10px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.ht{color:#f8fafc;font-size:17px;font-weight:900;letter-spacing:1px}
.hs{color:#64748b;font-size:10px;margin-top:1px}
#cnt{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--th)+var(--sb)+8px)}
#tbar{position:fixed;bottom:0;left:0;right:0;height:calc(var(--th)+var(--sb));padding-bottom:var(--sb);background:var(--sf);border-top:1px solid var(--bd);display:flex;z-index:100}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border:none;background:transparent;cursor:pointer;color:var(--tx3);font-family:inherit;font-size:9px;font-weight:600;padding-top:4px}
.tb .ti{font-size:18px}
.tb.on{color:var(--bl)}
.sc{padding:12px;display:none}
.sc.on{display:block}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px}
.card{background:var(--sf);border-radius:13px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.ci{font-size:18px;margin-bottom:5px}
.cv{font-size:16px;font-weight:900}
.cl{font-size:10px;color:var(--tx3);margin-top:1px}
.pnl{background:var(--sf);border-radius:13px;padding:13px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.pt{font-size:12px;font-weight:700;color:var(--tx2);margin-bottom:9px;display:flex;align-items:center;gap:5px}
.lr{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--bd)}
.lr:last-child{border-bottom:none}
.li{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;margin-right:9px}
.lm{flex:1;min-width:0}
.lt{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ls{font-size:10px;color:var(--tx3);margin-top:1px}
.fg{margin-bottom:11px}
.fl{font-size:10px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;display:block}
.fi,.fsel{width:100%;padding:10px 11px;border-radius:9px;border:1.5px solid var(--bd);background:var(--sf2);font-family:inherit;font-size:14px;color:var(--tx);-webkit-appearance:none;outline:none;transition:border-color .15s}
.fi:focus,.fsel:focus{border-color:var(--bl);background:#fff}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.ic{background:var(--sf2);border-radius:11px;padding:11px;margin-bottom:7px;border:1.5px solid var(--bd);position:relative}
.icr{display:flex;gap:7px;margin-top:7px;align-items:center}
.rb{position:absolute;top:9px;right:9px;width:22px;height:22px;border-radius:99px;background:var(--rdl);color:var(--rd);border:none;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:900}
.btn{display:block;width:100%;padding:13px;border-radius:11px;border:none;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;text-align:center}
.btn:active{opacity:.8}
.bp{background:var(--bl);color:#fff}
.bo{background:transparent;color:var(--bl);border:2px solid var(--bl)}
.bs{display:inline-flex;align-items:center;gap:3px;padding:6px 11px;border-radius:8px;font-size:11px;font-weight:700;border:none;cursor:pointer;font-family:inherit}
.tot{background:var(--nv);color:#fff;border-radius:11px;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.tl{font-size:11px;color:#94a3b8}
.ta{font-size:19px;font-weight:900}
.bdg{display:inline-block;padding:2px 7px;border-radius:99px;font-size:9px;font-weight:700}
.bg{background:var(--gnl);color:var(--gn)}
.bb{background:var(--bll);color:var(--bl)}
.ba{background:var(--aml);color:var(--am)}
.bp2{background:var(--pul);color:var(--pu)}
.br{background:var(--rdl);color:var(--rd)}
.seg{display:flex;background:var(--sf2);border-radius:9px;padding:3px;margin-bottom:11px;border:1px solid var(--bd);overflow-x:auto;gap:2px}
.sg{flex-shrink:0;padding:6px 10px;border:none;border-radius:7px;background:transparent;font-family:inherit;font-size:10px;font-weight:700;color:var(--tx3);cursor:pointer;white-space:nowrap}
.sg.on{background:var(--sf);color:var(--bl);box-shadow:0 1px 3px rgba(0,0,0,.1)}
#toast{position:fixed;bottom:calc(var(--th)+var(--sb)+10px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--nv);color:#fff;padding:9px 18px;border-radius:99px;font-size:12px;font-weight:700;white-space:nowrap;z-index:999;opacity:0;transition:all .25s;pointer-events:none}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.er{background:var(--rd)}
.mov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end}
.mov.on{display:flex}
.msh{width:100%;background:var(--sf);border-radius:18px 18px 0 0;padding:18px 14px calc(var(--sb)+18px);max-height:92vh;overflow-y:auto}
.mhd{width:38px;height:4px;background:var(--bd);border-radius:99px;margin:0 auto 13px}
.mtl{font-size:17px;font-weight:900;margin-bottom:13px}
.sbar{position:relative;margin-bottom:9px}
.sbar input{padding-left:32px}
.sbar::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none}
.phd{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.phd h2{font-size:18px;font-weight:900}
.emp{text-align:center;padding:24px;color:var(--tx3)}
.emp .ei{font-size:36px;margin-bottom:7px}
.ptbl{width:100%;border-collapse:collapse;font-size:11px}
.ptbl th{padding:5px 7px;text-align:left;color:var(--tx3);font-size:9px;font-weight:700;border-bottom:2px solid var(--bd)}
.ptbl td{padding:8px 7px;border-bottom:1px solid var(--bd);vertical-align:middle}
.ptbl tr:last-child td{border-bottom:none}
.rb2{height:7px;background:var(--bd);border-radius:99px;overflow:hidden;margin-top:3px}
.rf{height:100%;border-radius:99px;transition:width .3s}
code{font-family:monospace;font-size:10px;background:var(--sf2);padding:1px 4px;border-radius:3px}
.statnum{display:grid;gap:4px;text-align:center;background:var(--sf2);border-radius:8px;padding:7px}
.sn-v{font-size:13px;font-weight:900}
.sn-l{font-size:9px;color:var(--tx3)}
</style>
</head>
<body>
<div id="app">
<div id="hdr">
  <div><div class="ht">🏸 羽翼進銷存</div><div class="hs" id="hs">今日摘要</div></div>
</div>
<div id="cnt">
  <div class="sc on" id="sc-d"></div>
  <div class="sc" id="sc-s">
    <div class="phd"><h2>🛒 銷售開單</h2></div>
    <div class="pnl">
      <div class="fg2">
        <div class="fg"><label class="fl">客戶</label><input class="fi" id="s-c" placeholder="姓名/公司"></div>
        <div class="fg"><label class="fl">日期</label><input class="fi" id="s-d" type="date"></div>
      </div>
      <div style="font-size:12px;font-weight:700;color:var(--tx2);margin-bottom:7px">商品明細</div>
      <div id="si"></div>
      <button class="bs" style="background:var(--bll);color:var(--bl);margin:3px 0 11px" onclick="addSI()">＋ 新增</button>
      <div class="tot"><span class="tl">合計</span><span class="ta" id="st">NT$0</span></div>
      <div class="fg"><label class="fl">備註</label><input class="fi" id="s-n"></div>
      <button class="btn bp" onclick="submitSale()">確認銷售</button>
    </div>
  </div>
  <div class="sc" id="sc-p">
    <div class="phd"><h2>📦 進貨入庫</h2></div>
    <div class="pnl">
      <div class="fg2">
        <div class="fg"><label class="fl">供應商</label><input class="fi" id="p-s"></div>
        <div class="fg"><label class="fl">日期</label><input class="fi" id="p-d" type="date"></div>
      </div>
      <div style="font-size:12px;font-weight:700;color:var(--tx2);margin-bottom:7px">進貨明細</div>
      <div id="pi"></div>
      <button class="bs" style="background:var(--bll);color:var(--bl);margin:3px 0 11px" onclick="addPI()">＋ 新增</button>
      <div class="tot"><span class="tl">合計</span><span class="ta" id="pt">NT$0</span></div>
      <div class="fg"><label class="fl">備註</label><input class="fi" id="p-n"></div>
      <button class="btn bp" onclick="submitPur()">確認進貨</button>
    </div>
  </div>
  <div class="sc" id="sc-t">
    <div class="phd"><h2>🏸 穿線服務</h2></div>
    <div class="seg">
      <button class="sg on" id="ss-l" onclick="stab('l')">紀錄列表</button>
      <button class="sg" id="ss-n" onclick="stab('n')">新增穿線</button>
      <button class="sg" id="ss-r" onclick="stab('r')">大盤線狀態</button>
    </div>
    <div id="st-l"></div>
    <div id="st-n" style="display:none">
      <div class="pnl">
        <div class="fg2">
          <div class="fg"><label class="fl">客戶</label><input class="fi" id="v-c"></div>
          <div class="fg"><label class="fl">日期</label><input class="fi" id="v-d" type="date"></div>
        </div>
        <div class="fg"><label class="fl">球拍型號</label><input class="fi" id="v-r" placeholder="ex. YONEX Astrox 99 Pro"></div>
        <div class="fg"><label class="fl">球線選擇</label><select class="fsel" id="v-s" onchange="calcV()"></select></div>
        <div class="fg2">
          <div class="fg"><label class="fl">磅數</label><input class="fi" id="v-t" placeholder="26/28"></div>
          <div class="fg"><label class="fl">工資</label><input class="fi" type="number" id="v-l" value="150" oninput="calcV()"></div>
        </div>
        <div class="tot"><div><div class="tl">費用明細</div><div style="font-size:10px;color:#64748b;margin-top:1px" id="v-bd">-</div></div><span class="ta" id="v-tt">NT$150</span></div>
        <button class="btn bp" onclick="submitStr()">建立穿線單</button>
      </div>
    </div>
    <div id="st-r" style="display:none"></div>
  </div>
  <div class="sc" id="sc-i">
    <div class="phd"><h2>🗄️ 庫存管理</h2><button class="bs bp" style="padding:7px 12px" onclick="openM('ap')">＋ 新增</button></div>
    <div class="sbar"><input class="fi" id="iq" placeholder="搜尋品牌、型號、顏色…" oninput="renderInv()"></div>
    <div class="seg" id="icats"></div>
    <div id="il"></div>
  </div>
  <div class="sc" id="sc-a">
    <div class="phd"><h2>📈 統計分析</h2></div>
    <div class="seg">
      <button class="sg on" id="at-r" onclick="atabRank()">利潤排行</button>
      <button class="sg" id="at-c" onclick="atabCust()">客戶查詢</button>
      <button class="sg" id="at-p" onclick="atabProd()">產品查詢</button>
      <button class="sg" id="at-l" onclick="atabLedger()">交易紀錄</button>
    </div>
    <div id="ab"></div>
  </div>
  <div class="sc" id="sc-w">
    <div class="phd"><h2>🪢 球線管理</h2><button class="bs bp" style="padding:7px 12px" onclick="openM('as')">＋ 新增</button></div>
    <div class="seg">
      <button class="sg on" id="wt-k" onclick="wtab('k')">包裝線</button>
      <button class="sg" id="wt-r" onclick="wtab('r')">大盤線</button>
    </div>
    <div id="wl"></div>
  </div>
</div>
<div id="tbar">
  <button class="tb on" onclick="go('d')"><span class="ti">📊</span>總覽</button>
  <button class="tb" onclick="go('s')"><span class="ti">🛒</span>銷售</button>
  <button class="tb" onclick="go('p')"><span class="ti">📦</span>進貨</button>
  <button class="tb" onclick="go('t')"><span class="ti">🏸</span>穿線</button>
  <button class="tb" onclick="go('i')"><span class="ti">🗄️</span>庫存</button>
  <button class="tb" onclick="go('a')"><span class="ti">📈</span>統計</button>
  <button class="tb" onclick="go('w')"><span class="ti">🪢</span>球線</button>
</div>
</div>

<!-- MODAL: 新增商品 -->
<div class="mov" id="m-ap">
<div class="msh">
  <div class="mhd"></div><div class="mtl">新增商品</div>
  <div class="fg2">
    <div class="fg"><label class="fl">品牌</label><select class="fsel" id="ab-br">
      <option>YONEX</option><option>VICTOR</option><option>LI-NING</option><option>KIZUNA</option>
      <option>久奈司</option><option>超力</option><option>富力特</option><option>極限</option>
      <option>MIZUNO</option><option>瑞森</option><option>KAWASAKI</option><option>GXS</option>
      <option>薰風</option><option>KLINT</option><option>其他</option>
    </select></div>
    <div class="fg"><label class="fl">類別</label><select class="fsel" id="ab-ct">
      <option>球拍</option><option>握把布</option><option>配件</option>
    </select></div>
  </div>
  <div class="fg"><label class="fl">品名／型號</label><input class="fi" id="ab-nm" placeholder="ex. Astrox 99 Pro"></div>
  <div class="fg"><label class="fl">顏色</label><input class="fi" id="ab-cl" placeholder="ex. 黑/金"></div>
  <div class="fg3">
    <div class="fg"><label class="fl">訂價</label><input class="fi" type="number" id="ab-mp" value="0"></div>
    <div class="fg"><label class="fl">售價</label><input class="fi" type="number" id="ab-pr" value="0"></div>
    <div class="fg"><label class="fl">庫存</label><input class="fi" type="number" id="ab-st" value="0"></div>
  </div>
  <button class="btn bp" onclick="saveProd()" style="margin-bottom:8px">確認新增</button>
  <button class="btn bo" onclick="closeM('ap')">取消</button>
</div></div>

<!-- MODAL: 編輯商品 -->
<div class="mov" id="m-ep">
<div class="msh">
  <div class="mhd"></div><div class="mtl">編輯商品</div>
  <input type="hidden" id="ep-id">
  <div class="fg"><label class="fl">品名／型號</label><input class="fi" id="ep-nm"></div>
  <div class="fg"><label class="fl">顏色</label><input class="fi" id="ep-cl"></div>
  <div class="fg3">
    <div class="fg"><label class="fl">訂價</label><input class="fi" type="number" id="ep-mp"></div>
    <div class="fg"><label class="fl">售價</label><input class="fi" type="number" id="ep-pr"></div>
    <div class="fg"><label class="fl">庫存</label><input class="fi" type="number" id="ep-st"></div>
  </div>
  <button class="btn bp" onclick="saveEP()" style="margin-bottom:8px">儲存</button>
  <button class="btn" style="background:var(--rdl);color:var(--rd);margin-bottom:8px" onclick="delProd()">刪除商品</button>
  <button class="btn bo" onclick="closeM('ep')">取消</button>
</div></div>

<!-- MODAL: 新增球線 -->
<div class="mov" id="m-as">
<div class="msh">
  <div class="mhd"></div><div class="mtl">新增球線</div>
  <div class="fg"><label class="fl">球線名稱</label><input class="fi" id="as-nm" placeholder="ex. YONEX BG80"></div>
  <div class="fg"><label class="fl">顏色</label><input class="fi" id="as-cl" placeholder="ex. 白/藍"></div>
  <div class="fg"><label class="fl">類型</label>
    <select class="fsel" id="as-tp" onchange="toggleSF()">
      <option value="pkg">包裝線（單條）</option>
      <option value="reel">大盤線（整盤）</option>
    </select>
  </div>
  <div id="sf-pkg">
    <div class="fg3">
      <div class="fg"><label class="fl">訂價</label><input class="fi" type="number" id="sk-mp" value="0"></div>
      <div class="fg"><label class="fl">售價</label><input class="fi" type="number" id="sk-pr" value="0"></div>
      <div class="fg"><label class="fl">穿線價</label><input class="fi" type="number" id="sk-sp" value="200"></div>
    </div>
    <div class="fg"><label class="fl">庫存（條）</label><input class="fi" type="number" id="sk-st" value="0"></div>
  </div>
  <div id="sf-reel" style="display:none">
    <div class="fg2">
      <div class="fg"><label class="fl">進貨價/盤</label><input class="fi" type="number" id="sr-cp" value="0"></div>
      <div class="fg"><label class="fl">穿線價</label><input class="fi" type="number" id="sr-sp" value="200"></div>
    </div>
    <div class="fg2">
      <div class="fg"><label class="fl">總長度(米)</label><input class="fi" type="number" id="sr-mt" value="200"></div>
      <div class="fg"><label class="fl">每次用線(米)</label><input class="fi" type="number" id="sr-pu" value="10"></div>
    </div>
    <div class="fg"><label class="fl">盤數庫存</label><input class="fi" type="number" id="sr-st" value="0"></div>
  </div>
  <button class="btn bp" onclick="saveStr()" style="margin-bottom:8px">確認新增</button>
  <button class="btn bo" onclick="closeM('as')">取消</button>
</div></div>

<div id="toast"></div>
<script>
// ────────────────────────────────────────────────
// DATA
// ────────────────────────────────────────────────

function rmSI(i){SIt.splice(i,1);if(!SIt.length)SIt.push({id:'',qty:1,price:0,name:''});rSI();}
function onSSku(i,v){SIt[i].id=v;if(v.startsWith('p:')){const p=DB.products.find(x=>x.id===+v.slice(2));if(p){SIt[i].price=p.price;SIt[i].name=`${p.brand} ${p.name}`;}}if(v.startsWith('s:')){const s=DB.strings.find(x=>x.id===v.slice(2));if(s){SIt[i].price=s.price;SIt[i].name=s.name;}}rSI();}
function onSQty(i,v){SIt[i].qty=+v||1;rSI();}
function onSPr(i,v){SIt[i].price=+v||0;rSI();}
function submitSale(){
  const c=document.getElementById('s-c').value.trim();const d=document.getElementById('s-d').value;
  if(!c)return toast('請填客戶',true);
  for(const it of SIt){if(!it.id)return toast('請選商品',true);if(it.id.startsWith('p:')){const p=DB.products.find(x=>x.id===+it.id.slice(2));if(p.stock<it.qty)return toast(`${p.name} 庫存不足`,true);}if(it.id.startsWith('s:')){const s=DB.strings.find(x=>x.id===it.id.slice(2));if(s.stock<it.qty)return toast(`${s.name} 庫存不足`,true);}}
  SIt.forEach(it=>{if(it.id.startsWith('p:')){const p=DB.products.find(x=>x.id===+it.id.slice(2));if(p)p.stock-=it.qty;}if(it.id.startsWith('s:')){const s=DB.strings.find(x=>x.id===it.id.slice(2));if(s)s.stock-=it.qty;}});
  const tot=SIt.reduce((a,i)=>a+i.qty*i.price,0);
  DB.transactions.push({id:'TXN'+uid(),date:d,type:'sale',customer:c,items:SIt.map(x=>({...x})),total:tot,note:document.getElementById('s-n').value});
  sv();toast('銷售單已建立');initS();
}

function popStrSel(){
  const sel=document.getElementById('v-s');
  const pkgs=DB.strings.filter(s=>s.type==='pkg');
  const reels=DB.strings.filter(s=>s.type==='reel');
  sel.innerHTML='<option value="">-- 選球線 --</option>'+
    (pkgs.length?'<optgroup label="📦 包裝線">'+pkgs.map(s=>`<option value="k:${s.id}">${s.name} ${s.color}（庫存${s.stock}）穿${fmt(s.strPrice)}</option>`).join('')+'</optgroup>':'')+
    (reels.length?'<optgroup label="🎣 大盤線">'+reels.map(s=>{const mx=Math.floor(s.totalMeters/s.metersPerUse);const rm=mx-(s.usedTimes||0);return`<option value="r:${s.id}">${s.name}（剩${rm}次）穿${fmt(s.strPrice)}</option>`;}).join('')+'</optgroup>':'');
}
function calcV(){
  const v=document.getElementById('v-s').value;const lab=+document.getElementById('v-l').value||0;
  let sc=0,sn='-',tot=lab;
  if(v.startsWith('k:')){const s=DB.strings.find(x=>x.id===v.slice(2));if(s){sc=s.price;sn=s.name;tot=s.strPrice+lab;}}
  if(v.startsWith('r:')){const s=DB.strings.find(x=>x.id===v.slice(2));if(s){const mx=Math.floor(s.totalMeters/s.metersPerUse)||1;sc=Math.round(s.reelPrice/mx);sn=s.name+'(大盤)';tot=s.strPrice+lab;}}
  document.getElementById('v-bd').textContent=`${sn} 成本${fmt(sc)} ＋ 工資${fmt(lab)}`;
  document.getElementById('v-tt').textContent=fmt(tot);
}
function submitStr(){
  const c=document.getElementById('v-c').value.trim();const d=document.getElementById('v-d').value;const rk=document.getElementById('v-r').value.trim();const sv2=document.getElementById('v-s').value;const tn=document.getElementById('v-t').value.trim();const lab=+document.getElementById('v-l').value||0;
  if(!c||!rk||!sv2)return toast('請填完整資料',true);
  let sn='',sc=0,sch=0;
  if(sv2.startsWith('k:')){const s=DB.strings.find(x=>x.id===sv2.slice(2));if(!s||s.stock<1)return toast('庫存不足',true);s.stock--;sn=s.name;sc=s.price;sch=s.strPrice;}
  if(sv2.startsWith('r:')){const s=DB.strings.find(x=>x.id===sv2.slice(2));if(!s)return toast('找不到球線',true);const mx=Math.floor(s.totalMeters/s.metersPerUse);if((s.usedTimes||0)>=mx&&(s.reelStock||0)<1)return toast('大盤線已用完',true);if((s.usedTimes||0)>=mx){s.reelStock--;s.usedTimes=1;}else{s.usedTimes=(s.usedTimes||0)+1;}sn=s.name;sc=Math.round(s.reelPrice/(mx||1));sch=s.strPrice;}
  DB.stringing.push({id:'SV'+uid(),date:d,customer:c,racket:rk,string:sn,tension:tn,labor:lab,strCost:sc,strCharge:sch,total:sch+lab,status:'處理中'});
  sv();toast('穿線單已建立');stab('l');
}

function dStr(id){const r=DB.stringing.find(x=>x.id===id);if(r){r.status='完成';sv();rStrList();toast('已完成');}}
function delStrRec(id){if(!confirm('確定刪除？'))return;DB.stringing=DB.stringing.filter(x=>x.id!==id);sv();rStrList();toast('已刪除');}
function rReels(){
  const el=document.getElementById('st-r');
  const rs=DB.strings.filter(s=>s.type==='reel');
  if(!rs.length){el.innerHTML='<div class="emp"><div class="ei">🎣</div>尚無大盤線</div>';return;}
  el.innerHTML=rs.map(s=>{const mx=Math.floor(s.totalMeters/s.metersPerUse);const us=s.usedTimes||0;const rm=mx-us;const pct=Math.round(us/mx*100);const cpu=Math.round(s.reelPrice/mx);
    return`<div class="pnl" style="margin-bottom:9px">
      <div style="font-size:13px;font-weight:900;margin-bottom:2px">${s.name}</div>
      <div style="font-size:10px;color:var(--tx3);margin-bottom:7px">${s.color}・庫存${s.reelStock||0}盤</div>
      <div class="g4 statnum" style="margin-bottom:7px">
        <div><div class="sn-v">${us}</div><div class="sn-l">已穿次</div></div>
        <div><div class="sn-v" style="color:${rm<=3?'var(--rd)':'var(--gn)'}">${rm}</div><div class="sn-l">剩餘次</div></div>
        <div><div class="sn-v">${fmt(cpu)}</div><div class="sn-l">單次成本</div></div>
        <div><div class="sn-v" style="color:var(--bl)">${fmt(s.strPrice)}</div><div class="sn-l">穿線價</div></div>
      </div>
      <div style="font-size:10px;color:var(--tx3);margin-bottom:3px">進度 ${pct}%（${us}/${mx}）</div>
      <div class="rb2"><div class="rf" style="width:${pct}%;background:${pct>80?'var(--rd)':'var(--bl)'}"></div></div>
    </div>`;
  }).join('');
}

// ────────────────────────────────────────────────
// INVENTORY
// ────────────────────────────────────────────────
const BRNDS=['全部','YONEX','VICTOR','LI-NING','KIZUNA','久奈司','超力','富力特','極限','MIZUNO','瑞森','KAWASAKI','GXS','薰風','KLINT','其他'];
let icat='全部';
function renderInv(){
  document.getElementById('icats').innerHTML=BRNDS.map(b=>`<button class="sg${icat===b?' on':''}" onclick="setIC('${b}')">${b}</button>`).join('');
  const q=document.getElementById('iq').value.toLowerCase();
  const list=DB.products.filter(p=>(icat==='全部'||p.brand===icat)&&(`${p.brand} ${p.name} ${p.color} ${p.cat}`.toLowerCase().includes(q)));
  document.getElementById('il').innerHTML=list.length?list.map(p=>`<div class="pnl" style="margin-bottom:7px;padding:11px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
      <div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:900">${p.brand} ${p.name}</div><div style="font-size:10px;color:var(--tx3)">${p.cat}・${p.color}</div></div>
      <button class="bs" style="background:var(--bll);color:var(--bl);flex-shrink:0" onclick="openEP(${p.id})">編輯</button>
    </div>
    <div class="g4 statnum">
      <div><div class="sn-v" style="color:${p.stock<=3?'var(--rd)':'var(--tx)'}">${p.stock}</div><div class="sn-l">庫存</div></div>
      <div><div class="sn-v" style="font-size:11px">${fmt(p.msrp)}</div><div class="sn-l">訂價</div></div>
      <div><div class="sn-v" style="font-size:11px">${fmt(p.price)}</div><div class="sn-l">售價</div></div>
      <div><div class="sn-v" style="color:var(--gn)">${p.msrp>0?Math.round((p.price-p.msrp*0.65)/p.price*100)+'%':'—'}</div><div class="sn-l">毛利</div></div>
    </div>
  </div>`).join(''):'<div class="emp"><div class="ei">🔍</div>找不到商品</div>';
}
function setIC(c){icat=c;renderInv();}
function openEP(id){const p=DB.products.find(x=>x.id===id);if(!p)return;document.getElementById('ep-id').value=id;document.getElementById('ep-nm').value=p.name;document.getElementById('ep-cl').value=p.color;document.getElementById('ep-mp').value=p.msrp;document.getElementById('ep-pr').value=p.price;document.getElementById('ep-st').value=p.stock;openM('ep');}
function saveEP(){const id=+document.getElementById('ep-id').value;const p=DB.products.find(x=>x.id===id);if(!p)return;p.name=document.getElementById('ep-nm').value;p.color=document.getElementById('ep-cl').value;p.msrp=+document.getElementById('ep-mp').value;p.price=+document.getElementById('ep-pr').value;p.stock=+document.getElementById('ep-st').value;sv();closeM('ep');renderInv();toast('已更新');}
function delProd(){if(!confirm('確定刪除？'))return;DB.products=DB.products.filter(x=>x.id!==+document.getElementById('ep-id').value);sv();closeM('ep');renderInv();toast('已刪除');}
function saveProd(){const n=document.getElementById('ab-nm').value.trim();if(!n)return toast('請填品名',true);DB.products.push({id:Date.now(),brand:document.getElementById('ab-br').value,cat:document.getElementById('ab-ct').value,name:n,color:document.getElementById('ab-cl').value,msrp:+document.getElementById('ab-mp').value,price:+document.getElementById('ab-pr').value,stock:+document.getElementById('ab-st').value});sv();closeM('ap');renderInv();toast('已新增');}

// STRINGS MGMT
// ────────────────────────────────────────────────
function wtab(t){
  document.getElementById('wt-k').classList.toggle('on',t==='k');
  document.getElementById('wt-r').classList.toggle('on',t==='r');
  const el=document.getElementById('wl');
  if(t==='k'){const ps=DB.strings.filter(s=>s.type==='pkg');el.innerHTML=ps.length?ps.map(s=>`<div class="pnl" style="margin-bottom:7px;padding:11px">
    <div style="display:flex;justify-content:space-between;margin-bottom:5px">
      <div><div style="font-size:12px;font-weight:900">${s.name}</div><div style="font-size:10px;color:var(--tx3)">${s.color}</div></div>
      <button class="bs" style="background:var(--rdl);color:var(--rd)" onclick="delSt('${s.id}')">刪除</button>
    </div>
    <div class="g4 statnum">
      <div><div class="sn-v" style="color:${s.stock<=5?'var(--rd)':'var(--tx)'}">${s.stock}</div><div class="sn-l">庫存</div></div>
      <div><div class="sn-v" style="font-size:11px">${fmt(s.msrp)}</div><div class="sn-l">訂價</div></div>
      <div><div class="sn-v" style="font-size:11px">${fmt(s.price)}</div><div class="sn-l">售價</div></div>
      <div><div class="sn-v" style="color:var(--bl);font-size:11px">${fmt(s.strPrice)}</div><div class="sn-l">穿線價</div></div>
    </div>
  </div>`).join(''):'<div class="emp"><div class="ei">📦</div>尚無包裝線</div>';}
  else{const rs=DB.strings.filter(s=>s.type==='reel');el.innerHTML=rs.length?rs.map(s=>{const mx=Math.floor(s.totalMeters/s.metersPerUse);const us=s.usedTimes||0;const rm=mx-us;const cpu=Math.round(s.reelPrice/mx);
    return`<div class="pnl" style="margin-bottom:7px;padding:11px">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px">
        <div><div style="font-size:12px;font-weight:900">${s.name}</div><div style="font-size:10px;color:var(--tx3)">${s.color}・庫存${s.reelStock||0}盤</div></div>
        <button class="bs" style="background:var(--rdl);color:var(--rd)" onclick="delSt('${s.id}')">刪除</button>
      </div>
      <div class="g4 statnum" style="margin-bottom:6px">
        <div><div class="sn-v" style="font-size:11px">${fmt(s.reelPrice)}</div><div class="sn-l">進價/盤</div></div>
        <div><div class="sn-v">${mx}</div><div class="sn-l">總可穿</div></div>
        <div><div class="sn-v" style="color:var(--am)">${fmt(cpu)}</div><div class="sn-l">單次成本</div></div>
        <div><div class="sn-v" style="color:var(--bl);font-size:11px">${fmt(s.strPrice)}</div><div class="sn-l">穿線價</div></div>
      </div>
      <div style="font-size:10px;color:var(--tx3);margin-bottom:3px">剩餘 ${rm} 次 / 已穿 ${us} 次</div>
      <div class="rb2"><div class="rf" style="width:${Math.round(us/mx*100)}%;background:${rm<=3?'var(--rd)':'var(--gn)'}"></div></div>
    </div>`;
  }).join(''):'<div class="emp"><div class="ei">🎣</div>尚無大盤線</div>';}
}
function delSt(id){if(!confirm('確定刪除？'))return;DB.strings=DB.strings.filter(s=>s.id!==id);sv();const t=document.getElementById('wt-k').classList.contains('on')?'k':'r';wtab(t);toast('已刪除');}
function toggleSF(){const t=document.getElementById('as-tp').value;document.getElementById('sf-pkg').style.display=t==='pkg'?'':'none';document.getElementById('sf-reel').style.display=t==='reel'?'':'none';}
function saveStr2(){
  const n=document.getElementById('as-nm').value.trim();if(!n)return toast('請填名稱',true);
  const t=document.getElementById('as-tp').value;
  if(t==='pkg')DB.strings.push({id:'s'+Date.now(),type:'pkg',name:n,color:document.getElementById('as-cl').value,msrp:+document.getElementById('sk-mp').value,price:+document.getElementById('sk-pr').value,strPrice:+document.getElementById('sk-sp').value,stock:+document.getElementById('sk-st').value});
  else{const mt=+document.getElementById('sr-mt').value||200;const pu=+document.getElementById('sr-pu').value||10;DB.strings.push({id:'r'+Date.now(),type:'reel',name:n,color:document.getElementById('as-cl').value,reelPrice:+document.getElementById('sr-cp').value,strPrice:+document.getElementById('sr-sp').value,totalMeters:mt,metersPerUse:pu,usedTimes:0,reelStock:+document.getElementById('sr-st').value});}
  sv();closeM('as');wtab(t==='pkg'?'k':'r');toast('已新增');
}
// Fix: saveStr button calls saveStr2
document.getElementById('m-as').querySelector('.btn.bp').onclick=saveStr2;

// ────────────────────────────────────────────────
// STATISTICS
// ────────────────────────────────────────────────
let _lcat='all';
function atabRank(){['r','c','p','l'].forEach(x=>document.getElementById('at-'+x).classList.toggle('on',x==='r'));
  const pm={};
  DB.transactions.filter(t=>t.type==='sale').forEach(t=>t.items.forEach(it=>{let cost=0;if((it.id||'').startsWith('p:')){const p=DB.products.find(x=>x.id===+it.id.slice(2));if(p)cost=p.msrp*0.65;}if((it.id||'').startsWith('s:')){const s=DB.strings.find(x=>x.id===it.id.slice(2));if(s)cost=s.price*0.75;}const k=it.name||'未知';if(!pm[k])pm[k]={name:k,rev:0,prof:0,qty:0};pm[k].rev+=it.price*it.qty;pm[k].prof+=(it.price-cost)*it.qty;pm[k].qty+=it.qty;}));
  DB.stringing.forEach(r=>{const k='穿線：'+r.string;if(!pm[k])pm[k]={name:k,rev:0,prof:0,qty:0};pm[k].rev+=r.total;pm[k].prof+=r.total-r.strCost;pm[k].qty++;});
  const sorted=Object.values(pm).sort((a,b)=>b.prof-a.prof);
  document.getElementById('ab').innerHTML=`<div class="pnl"><div class="pt">💹 利潤排行</div>${sorted.length?`<table class="ptbl"><thead><tr><th>#</th><th>商品</th><th style="text-align:right">銷售額</th><th style="text-align:right">利潤</th><th style="text-align:right">利潤率</th></tr></thead><tbody>${sorted.map((r,i)=>`<tr><td style="font-weight:900;color:var(--bl)">${i+1}</td><td style="font-size:11px">${r.name}</td><td style="text-align:right">${fmt(r.rev)}</td><td style="text-align:right;color:var(--gn);font-weight:700">${fmt(r.prof)}</td><td style="text-align:right;color:var(--bl)">${r.rev?Math.round(r.prof/r.rev*100)+'%':'—'}</td></tr>`).join('')}</tbody></table>`:'<div class="emp">尚無資料</div>'}</div>`;
}
function atabCust(){['r','c','p','l'].forEach(x=>document.getElementById('at-'+x).classList.toggle('on',x==='c'));
  document.getElementById('ab').innerHTML=`<div class="pnl"><div class="pt">🔍 客戶查詢</div><div class="fg"><input class="fi" id="cq" placeholder="輸入客戶姓名…" oninput="sCust()"></div><div id="cr"></div></div>`;
}
function sCust(){const q=document.getElementById('cq').value.trim().toLowerCase();const el=document.getElementById('cr');if(!q){el.innerHTML='';return;}const txns=[...DB.transactions,...DB.stringing.map(r=>({...r,type:'stringing'}))].filter(t=>t.customer.toLowerCase().includes(q));if(!txns.length){el.innerHTML='<div class="emp">找不到紀錄</div>';return;}const tot=txns.reduce((a,t)=>a+t.total,0);el.innerHTML=`<div style="font-size:11px;color:var(--tx2);margin-bottom:7px">共 ${txns.length} 筆・合計 <strong>${fmt(tot)}</strong></div>`+txns.sort((a,b)=>b.date.localeCompare(a.date)).map(t=>`<div class="lr"><div class="lm"><div class="lt">${t.type==='sale'?'銷售':t.type==='purchase'?'進貨':'穿線'} · ${t.date}</div><div class="ls">${t.id}</div></div><div style="font-weight:900">${fmt(t.total)}</div></div>`).join('');}
function atabProd(){['r','c','p','l'].forEach(x=>document.getElementById('at-'+x).classList.toggle('on',x==='p'));
  document.getElementById('ab').innerHTML=`<div class="pnl"><div class="pt">🔍 產品查詢</div><div class="fg"><input class="fi" id="pq" placeholder="輸入產品型號…" oninput="sProd()"></div><div id="pr"></div></div>`;
}
function sProd(){const q=document.getElementById('pq').value.trim().toLowerCase();const el=document.getElementById('pr');if(!q){el.innerHTML='';return;}const items=DB.transactions.filter(t=>t.type==='sale').flatMap(t=>t.items.filter(i=>(i.name||'').toLowerCase().includes(q)).map(i=>({...i,date:t.date,customer:t.customer})));if(!items.length){el.innerHTML='<div class="emp">找不到紀錄</div>';return;}const tq=items.reduce((a,i)=>a+i.qty,0);const tr=items.reduce((a,i)=>a+i.qty*i.price,0);el.innerHTML=`<div style="font-size:11px;color:var(--tx2);margin-bottom:7px">共 ${tq} 件・銷售額 <strong>${fmt(tr)}</strong></div>`+items.map(i=>`<div class="lr"><div class="lm"><div class="lt">${i.name} × ${i.qty}</div><div class="ls">${i.date}・${i.customer}</div></div><div style="font-weight:900">${fmt(i.qty*i.price)}</div></div>`).join('');}
function atabLedger(){['r','c','p','l'].forEach(x=>document.getElementById('at-'+x).classList.toggle('on',x==='l'));rLedger();}
function rLedger(){
  const all=[...DB.transactions.map(t=>({...t,src:t.type==='sale'?'銷售':'進貨'})),...DB.stringing.map(r=>({id:r.id,date:r.date,type:'stringing',src:'穿線',customer:r.customer,total:r.total,items:[{name:`${r.racket}・${r.string}`,qty:1,price:r.total}]}))].sort((a,b)=>b.date.localeCompare(a.date));
  const fil=_lcat==='all'?all:all.filter(t=>t.type===_lcat);
  document.getElementById('ab').innerHTML=
    `<div style="display:flex;gap:5px;margin-bottom:9px;flex-wrap:wrap">${[['all','全部'],['sale','銷售'],['purchase','進貨'],['stringing','穿線']].map(([k,l])=>`<button class="bs" style="background:${_lcat===k?'var(--bl)':'var(--bll)'};color:${_lcat===k?'#fff':'var(--bl)'}" onclick="_lcat='${k}';rLedger()">${l}</button>`).join('')}</div>`+
    (fil.length?fil.map(t=>`<div class="pnl" style="margin-bottom:7px;padding:11px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><span class="bdg ${t.src==='銷售'?'bg':t.src==='進貨'?'bb':'bp2'}" style="margin-bottom:3px;display:inline-block">${t.src}</span>
          <div style="font-size:13px;font-weight:900">${t.customer}</div>
          <div style="font-size:10px;color:var(--tx3)">${t.date}・<code>${t.id}</code></div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
          <div style="font-size:15px;font-weight:900">${fmt(t.total)}</div>
          <button class="bs" style="background:var(--rdl);color:var(--rd)" onclick="delRec('${t.id}','${t.type}')">刪除</button>
        </div>
      </div>
      <div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--bd);font-size:11px;color:var(--tx2)">${(t.items||[]).map(i=>`${i.name} ×${i.qty}`).join('、')}</div>
    </div>`).join(''):'<div class="emp">尚無紀錄</div>');
}
function delRec(id,type){if(!confirm('確定刪除？'))return;if(type==='stringing')DB.stringing=DB.stringing.filter(r=>r.id!==id);else DB.transactions=DB.transactions.filter(t=>t.id!==id);sv();rLedger();toast('已刪除');}

function closeM(n){document.getElementById('m-'+n).classList.remove('on');}

document.getElementById('s-d').value=tod();
document.getElementById('p-d').value=tod();
rDash();initS();initP();renderInv();

if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
